version: "3.8"

services:
  # ============================================
  # Next.js Frontend
  # ============================================
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./apps/web/src:/app/apps/web/src
    depends_on:
      - api

  # ============================================
  # FastAPI Backend
  # ============================================
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
      - UPSTASH_REDIS_TOKEN=${UPSTASH_REDIS_TOKEN}
      - QSTASH_TOKEN=${QSTASH_TOKEN}
      - QSTASH_CURRENT_SIGNING_KEY=${QSTASH_CURRENT_SIGNING_KEY}
      - QSTASH_NEXT_SIGNING_KEY=${QSTASH_NEXT_SIGNING_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENVIRONMENT=development
      - BOT_SERVICE_URL=http://bot:8001
      - DIARIZATION_SERVICE_URL=http://diarization:8002
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
    volumes:
      - ./apps/api:/app/apps/api
      - audio-data:/tmp/vaktram
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Meeting Bot Service (Playwright + PulseAudio)
  # ============================================
  bot:
    build:
      context: ./apps/bot-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - API_URL=http://api:8000
      - BOT_SERVICE_PORT=8001
    volumes:
      - audio-data:/tmp/vaktram
    privileged: true

  # ============================================
  # Speaker Diarization Service (pyannote.audio)
  # ============================================
  diarization:
    build:
      context: ./apps/workers/diarization
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - LOG_LEVEL=INFO
    volumes:
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  audio-data:
  model-cache:
