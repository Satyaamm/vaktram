# PulseAudio configuration for Vaktram bot service
# Creates a virtual sink that captures browser audio output

# Load essential modules
load-module module-native-protocol-unix auth-anonymous=1 socket=/tmp/pulseaudio.socket
load-module module-always-sink

# Create a virtual null sink for capturing browser audio
# The monitor source (vaktram_sink.monitor) is what we record from
load-module module-null-sink sink_name=vaktram_sink sink_properties=device.description="Vaktram_Virtual_Sink"

# Set the virtual sink as the default output so Chrome routes audio there
set-default-sink vaktram_sink

# Automatically move new streams to our virtual sink
load-module module-default-device-restore
load-module module-stream-restore restore_device=false
