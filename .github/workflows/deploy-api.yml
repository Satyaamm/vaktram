name: Deploy API to Render

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "infra/docker/Dockerfile.api"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Before Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt 2>/dev/null || echo "No API requirements yet"
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest apps/api/tests/ -v || echo "No API tests found yet"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production

    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set. Skipping deployment."
            echo "To enable: add a Deploy Hook URL from your Render service settings."
            exit 0
          fi
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deployment triggered on Render"

      - name: Wait for Deploy
        if: ${{ secrets.RENDER_API_KEY != '' }}
        run: |
          echo "Render deployment triggered. Check Render dashboard for status."
          # Render deployments typically take 2-5 minutes
          # The service will automatically health-check after deploy
