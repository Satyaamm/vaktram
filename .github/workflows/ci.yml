name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff black isort

      - name: Run ruff
        run: ruff check apps/ packages/

      - name: Check black formatting
        run: black --check apps/ packages/

      - name: Check import sorting
        run: isort --check-only apps/ packages/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
        continue-on-error: true

      - name: Run ESLint
        working-directory: apps/web
        run: npm run lint
        continue-on-error: true

      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit
        continue-on-error: true

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: apps/api
        run: |
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: apps/api
        env:
          JWT_SECRET: test-secret-key-for-pytest-only
          ENCRYPTION_KEY: test-secret-key-for-pytest-only
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://localhost/vaktram_test
        run: pytest tests/ -v

  test-bot-service:
    name: Test Bot Service
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/bot-service/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        working-directory: apps/bot-service
        run: pytest tests/ -v --cov=bot --cov-report=xml || echo "No tests found yet"
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: test-key

  test-workers:
    name: Test Workers
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install transcription worker deps
        run: |
          pip install -r apps/workers/transcription/requirements.txt
          pip install pytest pytest-asyncio
        continue-on-error: true

      - name: Install summarizer worker deps
        run: |
          pip install -r apps/workers/summarizer/requirements.txt
          pip install pytest pytest-asyncio
        continue-on-error: true

      - name: Run transcription worker tests
        working-directory: apps/workers/transcription
        run: pytest tests/ -v || echo "No tests found yet"
        continue-on-error: true

      - name: Run summarizer worker tests
        working-directory: apps/workers/summarizer
        run: pytest tests/ -v || echo "No tests found yet"
        continue-on-error: true

  docker-smoke-api:
    name: Docker Smoke (API runtime)
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t vaktram-api -f apps/api/Dockerfile apps/api
      - name: Run container with stub env, hit /health
        run: |
          docker run -d --name api -p 8000:8000 \
            -e ENVIRONMENT=test \
            -e DATABASE_URL='postgresql+asyncpg://stub:stub@localhost:5432/stub' \
            -e JWT_SECRET='ci-jwt-secret-must-be-long-enough-for-hmac-256-bits' \
            -e ENCRYPTION_KEY='RPmH7M9wGlS1qRtgYcQv-zZTVlBxuQbVuHJHHXkP2is=' \
            vaktram-api
          # Wait up to 60s for /health to respond. If it never does, the
          # container crashed at import time — same bug class as the
          # missing-models incident. Print container logs and fail.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1; then
              echo "API responded ✅"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API never became healthy. Container logs follow:"
          docker logs api
          exit 1
      - name: Verify all routes register (no late-binding import errors)
        run: |
          curl -fsS http://localhost:8000/openapi.json \
            | python3 -c "import sys, json; d=json.load(sys.stdin); print('routes:', len(d['paths'])); assert len(d['paths']) > 50, 'route count suspiciously low'"
      - name: Stop container
        if: always()
        run: docker rm -f api || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint-python]
    strategy:
      matrix:
        service:
          - { name: "api", dockerfile: "infra/docker/Dockerfile.api" }
          - { name: "bot", dockerfile: "infra/docker/Dockerfile.bot" }
          - { name: "transcription", dockerfile: "infra/docker/Dockerfile.transcription" }
          - { name: "summarizer", dockerfile: "infra/docker/Dockerfile.summarizer" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
