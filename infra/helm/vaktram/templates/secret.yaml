{{- /*
   Shared secret consumed by all Vaktram services. Override values per-env via:
     helm install ... --set secrets.JWT_SECRET=...
   In real production, use a SealedSecret / ExternalSecret instead.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-env
type: Opaque
stringData:
{{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
