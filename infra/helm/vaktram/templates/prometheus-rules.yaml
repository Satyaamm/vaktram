{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-slo
  labels: { release: prometheus, app: vaktram }
spec:
  groups:
    - name: vaktram.slo
      rules:
        - alert: VaktramApiP95High
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{job="vaktram-api"}[5m])) by (le)
            ) > 0.4
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "API p95 latency above SLO (>400ms)"
        - alert: BotJoinFailureRateHigh
          expr: |
            sum(rate(bot_join_failures_total[15m]))
              / sum(rate(bot_join_attempts_total[15m])) > 0.05
          for: 15m
          labels: { severity: critical }
          annotations:
            summary: "Bot join failure rate >5% (SLO 95% join success)"
        - alert: TranscribeQueueBacklog
          expr: queue_depth_transcribe > 200
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "Transcribe queue depth above 200 — may breach 2x duration SLO"
        - alert: DeadLetterJobsRising
          expr: increase(dead_letter_jobs_total[1h]) > 50
          for: 30m
          labels: { severity: warning }
          annotations:
            summary: "DLQ growth >50 jobs in past hour"
{{- end }}
